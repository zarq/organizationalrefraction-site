[build]
  publish = "."

[[redirects]]
  from = "http://organizationalrefraction.com/*"
  to   = "https://organizationalrefraction.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.organizationalrefraction.com/*"
  to   = "https://organizationalrefraction.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.organizationalrefraction.com/*"
  to   = "https://organizationalrefraction.com/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[forms]
  # Netlify Forms automatically detects data-netlify="true" on forms
  # The contact form on /speaking/ will be captured here
